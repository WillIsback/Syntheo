name: Trivy Security Gate

on:
  push:
    branches: [main, "feat/**", "fix/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Block any CVSSv3 ≥ 9.0 (CRITICAL) — SecNumCloud requirement
# Mirrors the pre-flight check in infra/scripts/deploy.sh

jobs:
  scan-images:
    name: Scan image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - "traefik:v3.7.5"
          - "hashicorp/vault:1.21.4"
          - "postgres:16.14-alpine3.23"
          - "quay.io/keycloak/keycloak:24.0"
          - "otel/opentelemetry-collector-contrib:0.155.0"
          - "grafana/loki:3.7.3"
          - "prom/prometheus:v3.12.0"
          - "grafana/tempo:3.0.2"
          - "ghcr.io/mlflow/mlflow:v3.14.0"
          - "grafana/grafana:11.6.16"
          - "curlimages/curl:8.8.0"

    steps:
      - name: Scan ${{ matrix.image }}
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ matrix.image }}
          format: table
          exit-code: "1"
          severity: CRITICAL
          vuln-type: os,library

  scan-iac:
    name: Scan IaC (configs + Compose files)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Trivy filesystem / IaC + secret scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          scanners: misconfig,secret

  gate:
    name: Security gate
    runs-on: ubuntu-latest
    needs: [scan-images, scan-iac]
    if: always()
    steps:
      - name: Enforce gate
        run: |
          if [ "${{ needs.scan-images.result }}" != "success" ] || \
             [ "${{ needs.scan-iac.result }}" != "success" ]; then
            echo "BLOCKED: Trivy found CRITICAL vulnerabilities or secrets."
            echo "Check Renovate PRs for patched image digests before merging."
            exit 1
          fi
          echo "All Trivy checks passed — deploy gate cleared."
