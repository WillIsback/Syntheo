name: Trivy Security Gate

on:
  push:
    branches: [main, "feat/**", "fix/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Block any CVSSv3 ≥ 9.0 (CRITICAL) — SecNumCloud requirement
# Mirrors the pre-flight check in infra/scripts/deploy.sh

jobs:
  scan-images:
    name: Scan image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - "traefik:v3.1"
          - "hashicorp/vault:1.17.2"
          - "postgres:16-alpine"
          - "quay.io/keycloak/keycloak:24.0"
          - "otel/opentelemetry-collector-contrib:0.103.0"
          - "grafana/loki:3.0.0"
          - "prom/prometheus:v2.53.0"
          - "grafana/tempo:2.5.0"
          - "ghcr.io/mlflow/mlflow:v2.14.1"
          - "grafana/grafana:11.1.0"
          - "curlimages/curl:8.8.0"

    steps:
      - name: Scan ${{ matrix.image }}
        uses: aquasecurity/trivy-action@0.32.0
        with:
          image-ref: ${{ matrix.image }}
          format: table
          exit-code: "1"
          severity: CRITICAL
          vuln-type: os,library

  scan-iac:
    name: Scan IaC (configs + Compose files)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Trivy filesystem / IaC + secret scan
        uses: aquasecurity/trivy-action@0.32.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          scanners: misconfig,secret

  gate:
    name: Security gate
    runs-on: ubuntu-latest
    needs: [scan-images, scan-iac]
    if: always()
    steps:
      - name: Enforce gate
        run: |
          if [ "${{ needs.scan-images.result }}" != "success" ] || \
             [ "${{ needs.scan-iac.result }}" != "success" ]; then
            echo "BLOCKED: Trivy found CRITICAL vulnerabilities or secrets."
            echo "Check Renovate PRs for patched image digests before merging."
            exit 1
          fi
          echo "All Trivy checks passed — deploy gate cleared."
