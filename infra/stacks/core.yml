version: "3.9"

services:
  vault:
    image: hashicorp/vault:1.21.4
    command: server
    cap_add:
      - IPC_LOCK
    ports:
      - "127.0.0.1:8200:8200"
    environment:
      VAULT_ADDR: "https://127.0.0.1:8200"
      VAULT_SKIP_VERIFY: "true"
    volumes:
      - type: bind
        source: /mnt/syntheo_data/vault/data
        target: /vault/data
      - type: bind
        source: /mnt/syntheo_data/vault/tls
        target: /vault/tls
        read_only: true
      - type: bind
        source: ./config/vault/vault.hcl
        target: /vault/config/vault.hcl
        read_only: true
    networks:
      - vault_net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s

  vault-agent-traefik:
    image: hashicorp/vault:1.21.4
    command: ["agent", "-config=/vault/config/agent.hcl"]
    environment:
      VAULT_ADDR: "https://vault:8200"
      VAULT_SKIP_VERIFY: "true"
    volumes:
      - type: bind
        source: ./config/vault/agents/traefik.hcl
        target: /vault/config/agent.hcl
        read_only: true
      - traefik_secrets:/run/vault
    secrets:
      - vault_traefik_role_id
      - vault_traefik_secret_id
    networks:
      - vault_net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s

  traefik:
    image: traefik:v3.7.5
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: host
      - target: 443
        published: 443
        protocol: tcp
        mode: host
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ACME_EMAIL: "${ACME_EMAIL}"
      CROWDSEC_BOUNCER_KEY_FILE: /run/vault/CROWDSEC_BOUNCER_KEY
    volumes:
      - type: bind
        source: ./config/traefik/traefik.yml
        target: /etc/traefik/traefik.yml
        read_only: true
      - type: bind
        source: ./config/traefik/dynamic.yml
        target: /etc/traefik/dynamic.yml
        read_only: true
      - traefik_certs:/certs
      - traefik_secrets:/run/vault:ro
      - traefik_logs:/var/log/traefik
    networks:
      - frontend_net
      - vault_net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      update_config:
        order: start-first

secrets:
  vault_traefik_role_id:
    external: true
  vault_traefik_secret_id:
    external: true

volumes:
  traefik_certs:
  traefik_secrets:
  traefik_logs:

networks:
  frontend_net:
    external: true
  vault_net:
    external: true
